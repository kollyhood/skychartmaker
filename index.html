<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Supermarket Display - Smart Blend Engine</title>
  <link rel="icon" href="data:,">
  
  <style>
    /* Pre-tuned high-fidelity design theme tokens */
    :root {
      --theme-bg: rgba(255, 255, 255, 0.92);
      --theme-text: #1b4332;
      --theme-accent: #2e7d32;
      --theme-border: 2px solid #2e7d32;
      --theme-shadow: rgba(27, 67, 50, 0.25);
    }

    /* Theme 1: Organic Fresh Leafy Green */
    .theme-green {
      --theme-bg: rgba(244, 249, 244, 0.95);
      --theme-text: #1b4332;
      --theme-accent: #2e7d32;
      --theme-border: 3px solid #2e7d32;
      --theme-shadow: rgba(27, 67, 50, 0.2);
    }

    /* Theme 2: Mega Weekend Red Promo */
    .theme-red {
      --theme-bg: rgba(255, 241, 241, 0.96);
      --theme-text: #7f1d1d;
      --theme-accent: #dc2626;
      --theme-border: 3px dashed #dc2626;
      --theme-shadow: rgba(127, 29, 29, 0.25);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #0b0f19;
      color: #ffffff;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .header-bar {
      width: 100%; max-width: 800px;
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 20px; background-color: #1f2937; padding: 16px; border-radius: 12px;
    }

    .theme-selector {
      background: #374151; color: white; padding: 6px 12px; border-radius: 6px; border: 1px solid #4b5563; font-weight: 600;
    }

    .display-container {
      position: relative; width: 100%; max-w: 800px; aspect-ratio: 3 / 4;
      background-color: #030712; border-radius: 16px; overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .poster-img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .overlay-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

    /* The Upgraded Imbibed Product Box Card */
    .custom-product-card {
      position: absolute;
      background: var(--theme-bg);
      color: var(--theme-text);
      border: var(--theme-border);
      padding: 14px;
      border-radius: 16px;
      box-shadow: 0 12px 24px -6px var(--theme-shadow);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      pointer-events: auto;
      
      /* CRITICAL: Blends the box organically into the poster texture underneath */
      mix-blend-mode: normal; 
      backdrop-filter: blur(4px);
      
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Subdued decorative paper texture baked into the card background pattern */
    .custom-product-card::before {
      content: "";
      position: absolute; inset: 0;
      border-radius: 12px;
      opacity: 0.04;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://w3.org id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    }

    .card-layout { display: flex; flex-direction: column; height: 100%; justify-content: space-between; position: relative; z-index: 2; }
    .card-tag { font-size: 0.7rem; text-transform: uppercase; color: var(--theme-accent); font-weight: 800; letter-spacing: 0.05em; }
    .card-title { font-size: 1.1rem; font-weight: 800; line-height: 1.2; margin-top: 2px; }
    .card-price-row { display: flex; justify-content: space-between; align-items: baseline; margin-top: 6px; }
    .currency { font-size: 0.7rem; font-weight: 700; opacity: 0.8; }
    .price-value { font-size: 1.4rem; font-weight: 900; color: var(--theme-accent); }
  </style>
</head>
<body>

  <header class="header-bar">
    <h1 style="font-size:1.1rem; font-weight:700;">🛒 Smart Blending Canvas</h1>
    <div>
      <select id="themeDropdown" class="theme-selector">
        <option value="theme-green">🥬 Organic Leaf Green Template</option>
        <option value="theme-red">🎈 Hot Weekend Promo Red</option>
      </select>
    </div>
  </header>

  <!-- Canvas Wrapper Frame -->
  <main id="displayCanvasFrame" class="display-container theme-green">
    <img id="posterImg" src="" alt="Supermarket Poster" class="poster-img">
    <div id="productOverlayContainer" class="overlay-layer"></div>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const posterImg = document.getElementById('posterImg');
    const overlayContainer = document.getElementById('productOverlayContainer');
    const displayCanvasFrame = document.getElementById('displayCanvasFrame');
    const themeDropdown = document.getElementById('themeDropdown');

    // Local theme selector toggle handler
    themeDropdown.addEventListener('change', (e) => {
      displayCanvasFrame.className = `display-container ${e.target.value}`;
    });

    socket.on('stateUpdated', (state) => {
      // Direct reliable absolute path backup assignment
      posterImg.src = state.backgroundImage || 'https://unsplash.com';

      overlayContainer.innerHTML = '';
      state.products.forEach(product => {
        if (!product.isVisible) return;

        const card = document.createElement('div');
        card.className = 'custom-product-card';
        card.style.top = `${product.top}%`;
        card.style.left = `${product.left}%`;
        card.style.width = `${product.width}%`;
        card.style.height = `${product.height}%`;

        card.innerHTML = `
          <div class="card-layout">
            <span class="card-tag">Special Offer</span>
            <h3 class="card-title">${product.name}</h3>
            <div class="card-price-row">
              <span class="currency">OMR</span>
              <span class="price-value">${product.price}</span>
            </div>
          </div>
        `;
        overlayContainer.appendChild(card);
      });
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Supermarket Display - Pattern Imbibed</title>
  <link rel="icon" href="data:,">
  
  <style>
    /* Global Pattern Rules managed dynamically via Javascript */
    :root {
      --extracted-gradient: linear-gradient(135deg, #ffffff, #f3f4f6);
      --extracted-text-color: #111827;
      --extracted-shadow-color: rgba(0, 0, 0, 0.15);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0b0f19;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .header-bar {
      width: 100%;
      max-width: 800px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      background-color: #1f2937;
      padding: 16px;
      border-radius: 12px;
      border: 1px solid #374151;
    }

    .upload-btn {
      background-color: #2563eb;
      color: #ffffff;
      font-size: 0.875rem;
      font-weight: 600;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      display: inline-block;
    }

    .display-container {
      position: relative;
      width: 100%;
      max-width: 800px;
      aspect-ratio: 3 / 4;
      background-color: #030712;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .poster-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .overlay-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* Upgraded Pattern Imbibed Product Box */
    .custom-product-card {
      position: absolute;
      background: var(--extracted-gradient);
      color: var(--extracted-text-color);
      padding: 14px;
      border-radius: 14px;
      
      /* Subtle noise overlay layer to simulate physical paper print texture */
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://w3.org id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.015'/%3E%3C/svg%3E");
      
      /* Seamless depth blend using extracted shadow profile shades */
      box-shadow: 0 10px 25px -5px var(--extracted-shadow-color), 
                  0 8px 10px -6px var(--extracted-shadow-color),
                  inset 0 1px 0 rgba(255,255,255,0.4);
      
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border: 1px solid rgba(0, 0, 0, 0.08);
      pointer-events: auto;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .card-layout {
      display: flex;
      flex-direction: column;
      height: 100%;
      justify-content: space-between;
    }

    .card-tag {
      font-size: 0.7rem;
      text-transform: uppercase;
      opacity: 0.5;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .card-title {
      font-size: 1.05rem;
      font-weight: 800;
      line-height: 1.25;
    }

    .card-price-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-top: 6px;
    }

    .currency {
      font-size: 0.65rem;
      font-weight: 600;
      opacity: 0.7;
    }

    .price-value {
      font-size: 1.25rem;
      font-weight: 900;
      letter-spacing: -0.02em;
    }
  </style>
</head>
<body>

  <header class="header-bar">
    <h1 style="font-size:1.2rem; font-weight:700;">🛒 Pattern-Adaptive Display</h1>
    <div>
      <label class="upload-btn">
        🖼️ Upload Poster
        <input type="file" id="posterUpload" accept="image/*" style="display: none;">
      </label>
    </div>
  </header>

  <main class="display-container">
    <img id="posterImg" src="" alt="Supermarket Poster" class="poster-img">
    <div id="productOverlayContainer" class="overlay-layer"></div>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const posterImg = document.getElementById('posterImg');
    const overlayContainer = document.getElementById('productOverlayContainer');
    const posterUpload = document.getElementById('posterUpload');

    socket.on('stateUpdated', (state) => {
      posterImg.src = state.backgroundImage;

      // Imbibe style tokens extracted from the poster's color patterns
      if (state.theme.gradient) {
        document.documentElement.style.setProperty('--extracted-gradient', state.theme.gradient);
        document.documentElement.style.setProperty('--extracted-text-color', state.theme.text);
        document.documentElement.style.setProperty('--extracted-shadow-color', state.theme.shadow || 'rgba(0,0,0,0.15)');
      }

      overlayContainer.innerHTML = '';
      state.products.forEach(product => {
        if (!product.isVisible) return;

        const card = document.createElement('div');
        card.className = 'custom-product-card';
        card.style.top = `${product.top}%`;
        card.style.left = `${product.left}%`;
        card.style.width = `${product.width}%`;
        card.style.height = `${product.height}%`;

        card.innerHTML = `
          <div class="card-layout">
            <span class="card-tag">Special Offer</span>
            <h3 class="card-title">${product.name}</h3>
            <div class="card-price-row">
              <span class="currency">OMR</span>
              <span class="price-value">${product.price}</span>
            </div>
          </div>
        `;
        overlayContainer.appendChild(card);
      });
    });

    // Upgraded JavaScript Pattern Analysis
    posterUpload.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(event) {
        const img = new Image();
        img.onload = function() {
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          canvas.width = img.width;
          canvas.height = img.height;
          ctx.drawImage(img, 0, 0);

          // 1. Sample Top Region Pattern
          const topPixel = ctx.getImageData(Math.floor(img.width * 0.2), 20, 1, 1).data;
          // 2. Sample Bottom Region Pattern
          const bottomPixel = ctx.getImageData(Math.floor(img.width * 0.8), img.height - 20, 1, 1).data;

          const colorTop = `rgb(${topPixel[0]}, ${topPixel[1]}, ${topPixel[2]})`;
          const colorBottom = `rgb(${bottomPixel[0]}, ${bottomPixel[1]}, ${bottomPixel[2]})`;

          // Generate an elegant, matching linear gradient configuration
          const extractedGradient = `linear-gradient(135deg, ${colorTop}, ${colorBottom})`;

          // 3. Compute relative brightness of background layout to safely set dark/light typography rules
          const midBrigtness = Math.round(((topPixel[0]*299)+(topPixel[1]*587)+(topPixel[2]*114))/1000);
          const extractedText = (midBrigtness > 130) ? '#0f172a' : '#ffffff';

          // 4. Isolate background tone to build a native ambient drop-shadow wrapper
          const extractedShadow = `rgba(${Math.floor(bottomPixel[0]*0.4)}, ${Math.floor(bottomPixel[1]*0.4)}, ${Math.floor(bottomPixel[2]*0.4)}, 0.45)`;

          // Sync computed assets schema instantly back to Express
          fetch('/api/poster', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              image: event.target.result,
              theme: { 
                gradient: extractedGradient, 
                text: extractedText,
                shadow: extractedShadow
              }
            })
          });
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    });
  </script>
</body>
</html>

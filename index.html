<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Supermarket Display</title>
  <link rel="icon" href="data:,">
  
  <style>
    /* Global Pure CSS System Variables */
    :root {
      --extracted-theme-bg: #ffffff;
      --extracted-theme-text: #111827;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #111827;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    /* Top Control Header bar */
    .header-bar {
      width: 100%;
      max-width: 800px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      background-color: #1f2937;
      padding: 16px;
      border-radius: 12px;
      border: 1px solid #374151;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    .header-title {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .upload-btn {
      background-color: #2563eb;
      color: #ffffff;
      font-size: 0.875rem;
      font-weight: 600;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s;
      display: inline-block;
    }

    .upload-btn:hover {
      background-color: #1d4ed8;
    }

    /* Standard Interactive Poster Canvas Container */
    .display-container {
      position: relative;
      width: 100%;
      max-width: 800px;
      aspect-ratio: 3 / 4;
      background-color: #030712;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #1f2937;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }

    .poster-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .overlay-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* Adaptive Product Card Box Styles */
    .custom-product-card {
      position: absolute;
      background-color: var(--extracted-theme-bg);
      color: var(--extracted-theme-text);
      padding: 12px;
      border-radius: 12px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border: 1px solid rgba(0, 0, 0, 0.1);
      pointer-events: auto;
      transition: all 0.3s ease;
    }

    .card-layout {
      display: flex;
      flex-direction: column;
      height: 100%;
      justify-content: space-between;
    }

    .card-tag {
      font-size: 0.75rem;
      text-transform: uppercase;
      opacity: 0.6;
      font-weight: 600;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 800;
      line-height: 1.2;
    }

    .card-price-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-top: 8px;
    }

    .currency {
      font-size: 0.65rem;
      font-weight: 500;
      opacity: 0.75;
    }

    .price-value {
      font-size: 1.125rem;
      font-weight: 900;
    }
  </style>
</head>
<body>

  <!-- Top Action Header Tool -->
  <header class="header-bar">
    <h1 class="header-title">🛒 Live Display Canvas</h1>
    <div>
      <label class="upload-btn">
        🖼️ Upload Poster
        <input type="file" id="posterUpload" accept="image/*" style="display: none;">
      </label>
    </div>
  </header>

  <!-- Interactive Digital Canvas Area -->
  <main class="display-container">
    <img id="posterImg" src="" alt="Supermarket Poster" class="poster-img">
    <div id="productOverlayContainer" class="overlay-layer"></div>
  </main>

  <!-- Socket.io client initialization -->
  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const posterImg = document.getElementById('posterImg');
    const overlayContainer = document.getElementById('productOverlayContainer');
    const posterUpload = document.getElementById('posterUpload');

    // 1. Live State Syncing Handler
    socket.on('stateUpdated', (state) => {
      posterImg.src = state.backgroundImage;

      // Inject dynamically extracted custom theme rules safely
      document.documentElement.style.setProperty('--extracted-theme-bg', state.theme.bg);
      document.documentElement.style.setProperty('--extracted-theme-text', state.theme.text);

      overlayContainer.innerHTML = '';
      state.products.forEach(product => {
        if (!product.isVisible) return; // Leave hidden boxes completely invisible

        const card = document.createElement('div');
        card.className = 'custom-product-card';
        
        // Match percentage layout anchors precisely
        card.style.top = `${product.top}%`;
        card.style.left = `${product.left}%`;
        card.style.width = `${product.width}%`;
        card.style.height = `${product.height}%`;

        card.innerHTML = `
          <div class="card-layout">
            <span class="card-tag">Special Item</span>
            <h3 class="card-title">${product.name}</h3>
            <div class="card-price-row">
              <span class="currency">OMR</span>
              <span class="price-value">${product.price}</span>
            </div>
          </div>
        `;
        overlayContainer.appendChild(card);
      });
    });

    // 2. Automated Eye-Dropper Canvas Processor
    posterUpload.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(event) {
        const img = new Image();
        img.onload = function() {
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          canvas.width = img.width;
          canvas.height = img.height;
          ctx.drawImage(img, 0, 0);

          // Eye-drop margin check pixels
          const pixel = ctx.getImageData(20, 20, 1, 1).data;
          const r = pixel[0], g = pixel[1], b = pixel[2];
          const extractedBg = `rgb(${r}, ${g}, ${b})`;
          
          // Smart text contrast calculation formulas
          const brightness = Math.round(((r * 299) + (g * 587) + (b * 114)) / 1000);
          const extractedText = (brightness > 125) ? '#111827' : '#ffffff';

          // Fixed image upload path tracking values
          fetch('/api/poster', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              image: event.target.result, // Fixed upload payload bug
              theme: { bg: extractedBg, text: extractedText }
            })
          });
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    });
  </script>
</body>
</html>

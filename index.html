<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Supermarket Display</title>
  <!-- Tailwind CSS Engine -->
  <script src="https://tailwindcss.com"></script>
  <!-- Socket.io client -->
  <script src="/socket.io/socket.io.js"></script>
  <style>
    /* Global Dynamic Aesthetic variables overwritten by JS */
    :root {
      --extracted-theme-bg: #ffffff;
      --extracted-theme-text: #111827;
    }
    .custom-product-card {
      background-color: var(--extracted-theme-bg);
      color: var(--extracted-theme-text);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
  </style>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center p-4">

  <!-- Control Header (Top Right Upload Tools) -->
  <header class="w-full max-w-4xl flex justify-between items-center mb-4 bg-gray-800 p-4 rounded-xl shadow-lg border border-gray-700">
    <h1 class="text-xl font-bold tracking-wide">🛒 Live Display Canvas</h1>
    <div class="flex items-center gap-3">
      <label class="bg-blue-600 hover:bg-blue-500 text-sm font-semibold py-2 px-4 rounded-lg cursor-pointer transition-colors shadow-md">
        🖼️ Upload Poster
        <input type="file" id="posterUpload" accept="image/*" class="hidden">
      </label>
    </div>
  </header>

  <!-- Interactive Digital Flyer Canvas Area -->
  <main class="relative w-full max-w-4xl aspect-[3/4] bg-gray-950 rounded-2xl overflow-hidden shadow-2xl border border-gray-800">
    <!-- Live Poster Background -->
    <img id="posterImg" src="" alt="Supermarket Poster" class="w-full h-full object-cover">
    
    <!-- Layer holding your dynamic Product Overlays -->
    <div id="productOverlayContainer" class="absolute inset-0 pointer-events-none"></div>
  </main>

  <script>
    const socket = io();
    const posterImg = document.getElementById('posterImg');
    const overlayContainer = document.getElementById('productOverlayContainer');
    const posterUpload = document.getElementById('posterUpload');

    // 1. Receive and Redraw Screen States Live
    socket.on('stateUpdated', (state) => {
      // Set Poster Background
      posterImg.src = state.backgroundImage;

      // Update Custom CSS Theme Rules
      document.documentElement.style.setProperty('--extracted-theme-bg', state.theme.bg);
      document.documentElement.style.setProperty('--extracted-theme-text', state.theme.text);

      // Render Interactive Product Cards
      overlayContainer.innerHTML = '';
      state.products.forEach(product => {
        if (!product.isVisible) return; // Leave hidden elements unrendered

        const card = document.createElement('div');
        card.className = 'absolute custom-product-card p-3 rounded-xl shadow-xl flex flex-col justify-between border border-black/10 pointer-events-auto scale-100 opacity-100 animate-fade-in';
        
        // Match relative percentage grids precisely
        card.style.top = `${product.top}%`;
        card.style.left = `${product.left}%`;
        card.style.width = `${product.width}%`;
        card.style.height = `${product.height}%`;

        card.innerHTML = `
          <div class="flex flex-col h-full justify-between">
            <span class="text-xs uppercase tracking-wider opacity-60 font-semibold">Special Item</span>
            <h3 class="text-base font-extrabold leading-tight line-clamp-2">${product.name}</h3>
            <div class="flex justify-between items-baseline mt-2">
              <span class="text-[10px] font-medium opacity-75">OMR</span>
              <span class="text-lg font-black tracking-tight">${product.price}</span>
            </div>
          </div>
        `;
        overlayContainer.appendChild(card);
      });
    });

    // 2. Client Side Canvas Extraction Logic
    posterUpload.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(event) {
        const img = new Image();
        img.onload = function() {
          // Re-draw onto internal canvas to run automated color sample analysis
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          canvas.width = img.width;
          canvas.height = img.height;
          ctx.drawImage(img, 0, 0);

          // Sample pixels from the top-left margin border (X: 20px, Y: 20px) to extract background theme
          const pixel = ctx.getImageData(20, 20, 1, 1).data;
          const r = pixel[0], g = pixel[1], b = pixel[2];
          
          const extractedBg = `rgb(${r}, ${g}, ${b})`;
          
          // Determine high-contrast text overlay styling using color brightness math
          const brightness = Math.round(((r * 299) + (g * 587) + (b * 114)) / 1000);
          const extractedText = (brightness > 125) ? '#111827' : '#ffffff'; // Light theme uses dark slate, dark theme uses white

          // Send updated asset configurations back to Node.js backend
          fetch('/api/poster', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              image: event.target.value, // Base64 payload data
              theme: { bg: extractedBg, text: extractedText }
            })
          });
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    });
  </script>
</body>
</html>

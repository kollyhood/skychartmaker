<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supermarket Display - Admin Panel</title>
  <link rel="icon" href="data:,">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background-color: #0f172a;
      color: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 30px;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
    }
    header {
      margin-bottom: 24px;
      border-bottom: 2px solid #1e293b;
      padding-bottom: 16px;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
    }
    .card {
      background-color: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
    .info h3 {
      font-size: 1.1rem;
      margin-bottom: 4px;
    }
    .info p {
      font-size: 0.85rem;
      color: #94a3b8;
    }
    .btn {
      font-weight: 600;
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .btn-show {
      background-color: #10b981;
      color: white;
    }
    .btn-show:hover {
      background-color: #059669;
    }
    .btn-hide {
      background-color: #ef4444;
      color: white;
    }
    .btn-hide:hover {
      background-color: #dc2626;
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>🎛️ Supermarket Box Controller</h1>
      <p style="color: #94a3b8; font-size: 0.9rem; margin-top: 4px;">Click actions to instantly show or hide boxes on the live canvas display.</p>
    </header>

    <!-- Dynamic list managed by JavaScript -->
    <div id="productControlsList"></div>
  </div>

  <!-- Socket.io client to sync product visibility changes in real time -->
  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const listContainer = document.getElementById('productControlsList');

    // Toggle logic function that targets backend server API endpoints
    async function toggleProduct(productId, isCurrentlyVisible) {
      const endpoint = isCurrentlyVisible ? '/api/products/hide' : '/api/products/show';
      
      try {
        await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: productId })
        });
      } catch (err) {
        console.error('Failed to trigger visibility state update:', err);
      }
    }

    // Listens to global system state updates to automatically redraw control buttons
    socket.on('stateUpdated', (state) => {
      listContainer.innerHTML = '';

      state.products.forEach(product => {
        const card = document.createElement('div');
        card.className = 'card';

        card.innerHTML = `
          <div class="info">
            <h3>${product.name}</h3>
            <p>Price: OMR ${product.price} | Status: ${product.isVisible ? '🟢 Active On Screen' : '🔴 Hidden'}</p>
          </div>
          <button class="btn ${product.isVisible ? 'btn-hide' : 'btn-show'}">
            ${product.isVisible ? 'Hide Box' : 'Show Box'}
          </button>
        `;

        // Attach dynamic interactive event triggers to buttons
        card.querySelector('button').addEventListener('click', () => {
          toggleProduct(product.id, product.isVisible);
        });

        listContainer.appendChild(card);
      });
    });
  </script>
</body>
</html>
